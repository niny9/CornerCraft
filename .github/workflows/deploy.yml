name: Deploy to Aliyun

on:
  push:
    branches:
      - main

env:
  REGISTRY: ${{ secrets.ACR_REGISTRY }}
  IMAGE_NAME: photo-to-3d

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker stop photo-to-3d || true
            docker rm photo-to-3d || true
            docker run -d \
              --name photo-to-3d \
              --restart unless-stopped \
              -p 3000:3000 \
              ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker image prune -f